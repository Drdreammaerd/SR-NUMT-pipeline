# ============================================================
# NUMT Pipeline — Conda Environment Specification
# ============================================================
# This file pins ALL dependencies for reproducible Docker builds.
# Used by: Docker/Dockerfile
#
# To update: edit versions here, then rebuild Docker image.
# ============================================================
name: numt-pipeline
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # ---- Python core ----
  - python=3.11.9
  - pip

  # ---- Data analysis (Stage 0, 1, 2) ----
  - pandas=2.2.2
  - numpy=1.26.4
  - scipy=1.13.1

  # ---- Bioinformatics (Stage 1, 2) ----
  - pysam=0.22.1
  - samtools=1.20
  - bedtools=2.31.1

  # ---- BLAT (Stage 1, 2: NUMT validation) ----
  - ucsc-blat

  # ---- Workflow engine (Stage 0 orchestration) ----
  - snakemake-minimal=8.13.0
  - perl-app-cpanminus

  # ---- VCF tools (Stage 0: optional) ----
  - vcftools=0.1.16

